<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor de Cuestionarios</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; margin-bottom: 20px; box-sizing: border-box; }
        h1 { color: #1b5e20; font-size: 1.5rem; text-align: center; margin-top: 0; }
        #drop-zone { border: 2px dashed #a5d6a7; padding: 40px; text-align: center; color: #666; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        #drop-zone.hover { background: #e8f5e9; border-color: #2e7d32; }
        #status { padding: 15px; border-radius: 6px; display: none; margin-bottom: 20px; width: 100%; max-width: 800px; box-sizing: border-box; }
        .success { background: #dcedc8; color: #33691e; border: 1px solid #a5d6a7; display: block !important; }
        .error { background: #ffcdd2; color: #b71c1c; border: 1px solid #ef9a9a; display: block !important; white-space: pre-wrap; }
        
        /* Estilos del Editor */
        #nombre-archivo-display { font-weight: bold; color: #2e7d32; background: #e8f5e9; padding: 5px 10px; border-radius: 4px; margin-bottom: 15px; display: inline-block; }
        .pregunta-edit { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; position: relative; background: #fafafa; }
        label { display: block; font-weight: bold; margin-top: 15px; font-size: 0.85rem; color: #444; text-transform: uppercase; }
        textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; font-family: inherit; resize: vertical; }
        .opcion-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .opcion-input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-delete { position: absolute; top: 15px; right: 15px; background: #ff5252; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 12px; font-size: 0.8rem; }
        .btn-delete:hover { background: #d32f2f; }
        .btn-download { background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-download:hover { background: #1b5e20; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .correcta-radio { cursor: pointer; width: 20px; height: 20px; accent-color: #2e7d32; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🛠 Validador y Editor Visual</h1>
        <div id="drop-zone">Arrastra el JSON aquí o haz clic para buscarlo</div>
        <input type="file" id="file-input" style="display: none" accept=".json">
    </div>

    <div id="status"></div>

    <div id="editor-container" style="width: 100%; max-width: 800px; display: none;">
        <div class="card" style="text-align: center; padding: 1rem;">
            <span>Editando: </span><span id="nombre-archivo-display"></span>
        </div>
        
        <div id="lista-preguntas"></div>
        
        <div class="card">
            <button class="btn-download" onclick="descargarJSON()">📥 Guardar y Descargar JSON</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');
        const editorContainer = document.getElementById('editor-container');
        const listaPreguntas = document.getElementById('lista-preguntas');
        const nombreArchivoDisplay = document.getElementById('nombre-archivo-display');
        
        let quizData = [];
        let originalFileName = "cuestionario.json";

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => procesarArchivo(e.target.files[0]);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('hover');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('hover'); procesarArchivo(e.dataTransfer.files[0]); };

        function procesarArchivo(file) {
            if (!file) return;
            originalFileName = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const errores = comprobarEstructura(data);
                    
                    if (errores.length === 0) {
                        // Limpiamos los IDs al cargar para trabajar sin ellos
                        quizData = data.map(({id, ...rest}) => rest);
                        nombreArchivoDisplay.innerText = originalFileName;
                        mostrarMensaje("✅ Archivo cargado correctamente.", "success");
                        renderEditor();
                    } else {
                        mostrarMensaje("❌ Errores en la estructura:\n" + errores.join("\n"), "error");
                        editorContainer.style.display = 'none';
                    }
                } catch (err) {
                    mostrarMensaje("💥 Error: El archivo no es un JSON válido o tiene errores de sintaxis.", "error");
                }
            };
            reader.readAsText(file);
        }

        function comprobarEstructura(data) {
            let errs = [];
            if (!Array.isArray(data)) return ["El archivo debe ser una lista [ ... ]"];
            data.forEach((item, i) => {
                if (!item.pregunta) errs.push(`Bloque ${i+1}: Falta la pregunta.`);
                if (!Array.isArray(item.opciones) || item.opciones.length < 2) errs.push(`Bloque ${i+1}: Faltan opciones.`);
                if (typeof item.respuestaCorrecta !== 'number') errs.push(`Bloque ${i+1}: No hay respuesta correcta definida.`);
            });
            return errs;
        }

        function mostrarMensaje(msg, tipo) {
            status.innerText = msg;
            status.className = tipo;
        }

        function renderEditor() {
            editorContainer.style.display = 'block';
            listaPreguntas.innerHTML = "";

            quizData.forEach((item, index) => {
                const pCard = document.createElement('div');
                pCard.className = 'pregunta-edit card';
                pCard.innerHTML = `
                    <button class="btn-delete" onclick="borrarPregunta(${index})">Eliminar Pregunta</button>
                    
                    <label>Pregunta:</label>
                    <textarea rows="2" onchange="actualizarDato(${index}, 'pregunta', this.value)">${item.pregunta}</textarea>
                    
                    <label>Opciones y Respuesta Correcta:</label>
                    ${item.opciones.map((op, i) => `
                        <div class="opcion-row">
                            <input type="radio" name="correcta-${index}" class="correcta-radio" 
                                ${item.respuestaCorrecta === i ? 'checked' : ''} 
                                onclick="actualizarDato(${index}, 'respuestaCorrecta', ${i})">
                            <input type="text" class="opcion-input" value="${op}" onchange="actualizarOpcion(${index}, ${i}, this.value)">
                        </div>
                    `).join('')}
                    
                    <label>Explicación (se muestra al fallar):</label>
                    <textarea rows="2" onchange="actualizarDato(${index}, 'explicacion', this.value)">${item.explicacion || ''}</textarea>
                `;
                listaPreguntas.appendChild(pCard);
            });
        }

        function actualizarDato(index, campo, valor) {
            quizData[index][campo] = valor;
        }

        function actualizarOpcion(pIndex, oIndex, valor) {
            quizData[pIndex].opciones[oIndex] = valor;
        }

        function borrarPregunta(index) {
            if(confirm("¿Estás seguro de eliminar esta pregunta?")) {
                quizData.splice(index, 1);
                renderEditor();
            }
        }

        function descargarJSON() {
            // El JSON se exporta limpio, sin IDs y con el formato original
            const blob = new Blob([JSON.stringify(quizData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = originalFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
