<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor de Cuestionarios Pro</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; margin-bottom: 20px; box-sizing: border-box; }
        h1 { color: #1b5e20; font-size: 1.5rem; text-align: center; margin-top: 0; }
        
        /* Camuflaje */
        .blur-content { filter: blur(8px); pointer-events: none; user-select: none; opacity: 0.5; }
        .hidden { display: none !important; }

        /* Carga */
        .upload-section { display: flex; gap: 20px; flex-wrap: wrap; }
        .upload-box { flex: 1; min-width: 250px; display: flex; flex-direction: column; }
        #drop-zone { border: 2px dashed #a5d6a7; padding: 20px; text-align: center; color: #666; cursor: pointer; border-radius: 8px; height: 80px; display: flex; align-items: center; justify-content: center; background: #fafafa; }
        
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; margin-bottom: 10px; }
        
        /* Botones con estilo verde de la App */
        .btn-green-app { background: #2e7d32; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; padding: 10px; }
        .btn-green-app:hover:not(:disabled) { background: #1b5e20; }
        .btn-green-app:disabled { background: #ccc; cursor: not-allowed; opacity: 0.5; }

        .btn-add { background: #1976d2; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .btn-import { background: #673ab7; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; }
        .btn-delete { position: absolute; top: 15px; right: 15px; background: #ff5252; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 12px; }
        .btn-download { background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; width: 100%; font-weight: bold; }

        #status { padding: 15px; border-radius: 6px; display: none; margin-bottom: 20px; width: 100%; max-width: 800px; text-align: center; font-weight: bold; }
        .success { background: #dcedc8; color: #33691e; border: 1px solid #a5d6a7; display: block !important; }
        
        /* Editor tarjetas */
        .pregunta-edit { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; position: relative; background: #fafafa; }
        label { display: block; font-weight: bold; margin-top: 15px; font-size: 0.85rem; color: #444; text-transform: uppercase; }
        textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; font-family: inherit; }
        .opcion-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .opcion-input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .correcta-radio { cursor: pointer; width: 20px; height: 20px; accent-color: #2e7d32; }

        /* Modal */
        #modal-import { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:100; }
        .modal-content { background:white; padding:20px; border-radius:12px; width:90%; max-width:700px; }
        .help-text { font-size: 0.85rem; color: #444; background: #fdfdfd; padding: 15px; border-radius: 6px; border-left: 5px solid #673ab7; margin-bottom: 15px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="main-title">🔒 Editor Protegido</h1>
        <div class="upload-section">
            <div class="upload-box">
                <label>Archivo Local:</label>
                <div id="drop-zone">Arrastra un JSON o haz clic</div>
                <input type="file" id="file-input" style="display: none" accept=".json">
            </div>
            <div class="upload-box">
                <label>Archivo del Servidor:</label>
                <select id="repo-selector">
                    <option value="" disabled selected>Cargando índice...</option>
                </select>
                <button class="btn-green-app" id="btn-crear-nuevo" onclick="crearNuevoVacio()" disabled>✨ Crear Nuevo Cuestionario</button>
            </div>
        </div>
    </div>

    <div id="status"></div>

    <div id="editor-container" class="blur-content" style="width: 100%; max-width: 800px; display: none;">
        <div class="card" style="text-align: center; padding: 1rem;">
            <span>Editando: </span><span id="nombre-archivo-display" style="font-weight:bold; color: #2e7d32;"></span>
        </div>
        <div id="lista-preguntas"></div>
        <div id="admin-controls" class="card hidden">
            <button class="btn-import" onclick="abrirImportador()">📥 Importar desde Texto Plano</button>
            <button class="btn-add" onclick="añadirPregunta()">➕ Añadir Nueva Pregunta Manual</button>
            <button class="btn-download" onclick="descargarJSON()">📥 Guardar y Descargar JSON</button>
        </div>
    </div>

    <div id="modal-import">
        <div class="modal-content">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin:0">📥 Importador de Texto Plano</h3>
                <button onclick="cargarEjemploEnArea()" style="cursor:pointer; font-size:0.8rem; background:#eee; border:1px solid #ccc; border-radius:4px; padding:4px 10px;">Ver ejemplo</button>
            </div>
            <div class="help-text">
                <strong>Instrucciones:</strong> Pregunta (línea 1), Opciones con guion (<b>- Opción</b>), Respuesta (<b>R:</b> índice), Explicación (<b>Exp:</b>). Una línea en blanco entre bloques.
            </div>
            <textarea id="import-area" rows="12" placeholder="Pega aquí tus bloques de preguntas..." style="width:100%; margin-bottom:15px; border:1px solid #ddd; border-radius:8px; padding:10px; font-family:monospace;"></textarea>
            <div style="display:flex; gap:10px">
                <button class="btn-add" style="margin:0; flex:2" onclick="procesarTextoPlano()">🚀 Procesar e Insertar</button>
                <button class="btn-delete" style="position:static; flex:1" onclick="cerrarImportador()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const repoSelector = document.getElementById('repo-selector');
        const status = document.getElementById('status');
        const editorContainer = document.getElementById('editor-container');
        const listaPreguntas = document.getElementById('lista-preguntas');
        const adminControls = document.getElementById('admin-controls');
        const modalImport = document.getElementById('modal-import');
        const importArea = document.getElementById('import-area');
        const btnCrearNuevo = document.getElementById('btn-crear-nuevo');
        
        let quizData = [];
        let originalFileName = "nuevo_test.json";
        let modoDios = false;

        document.addEventListener('keydown', (e) => {
            if (e.key === "F2") { 
                const clave = prompt("Introduce clave maestra:");
                if(clave === "1234") activarAdmin();
            }
        });

        function activarAdmin() {
            modoDios = true;
            document.getElementById('main-title').innerText = "🛠 Editor de Cuestionarios";
            editorContainer.classList.remove('blur-content');
            adminControls.classList.remove('hidden');
            btnCrearNuevo.disabled = false; // SE ACTIVA AL DESBLOQUEAR
            if(quizData.length > 0) renderEditor();
            mostrarMensaje("Modo edición desbloqueado", "success");
        }

        function crearNuevoVacio() {
            const nombre = prompt("Nombre del archivo:", "nuevo_test.json");
            if (nombre) {
                originalFileName = nombre.endsWith('.json') ? nombre : nombre + '.json';
                quizData = [];
                document.getElementById('nombre-archivo-display').innerText = originalFileName;
                editorContainer.style.display = 'block';
                renderEditor();
                abrirImportador();
            }
        }

        function abrirImportador() { modalImport.style.display = 'flex'; importArea.focus(); }
        function cerrarImportador() { modalImport.style.display = 'none'; importArea.value = ''; }
        function cargarEjemploEnArea() {
            importArea.value = `Pregunta de ejemplo\n- Opción A\n- Opción B\nR: 0\nExp: Explicación aquí.`;
        }

        function procesarTextoPlano() {
            const texto = importArea.value.trim();
            if(!texto) return;
            const bloques = texto.split(/\n\s*\n/);
            bloques.forEach(bloque => {
                const lineas = bloque.split('\n').map(l => l.trim());
                let pregunta = lineas[0];
                let opciones = [];
                let respuestaCorrecta = 0;
                let explicacion = "";
                lineas.slice(1).forEach(linea => {
                    if (linea.startsWith('-') || linea.match(/^\d[\.\)]/)) {
                        opciones.push(linea.replace(/^[- \d\.\)]+/, '').trim());
                    } else if (linea.toUpperCase().startsWith('R:')) {
                        respuestaCorrecta = parseInt(linea.replace(/R:/i, '').trim()) || 0;
                    } else if (linea.toUpperCase().startsWith('EXP:')) {
                        explicacion = linea.replace(/EXP:/i, '').trim();
                    }
                });
                if(pregunta && opciones.length > 0) quizData.push({ pregunta, opciones, respuestaCorrecta, explicacion });
            });
            renderEditor();
            cerrarImportador();
        }

        async function cargarIndice() {
            try {
                const res = await fetch('index.json');
                const temas = await res.json();
                repoSelector.innerHTML = '<option value="" disabled selected>Selecciona un test...</option>';
                temas.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.archivo; opt.innerText = t.titulo;
                    repoSelector.appendChild(opt);
                });
            } catch (e) {}
        }

        repoSelector.onchange = async (e) => {
            originalFileName = e.target.value.split('/').pop();
            const res = await fetch(e.target.value);
            procesarDatos(await res.json());
        };

        document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                originalFileName = file.name;
                const reader = new FileReader();
                reader.onload = (ev) => procesarDatos(JSON.parse(ev.target.result));
                reader.readAsText(file);
            }
        };

        function procesarDatos(data) {
            quizData = data.map(({id, ...rest}) => rest);
            document.getElementById('nombre-archivo-display').innerText = originalFileName;
            editorContainer.style.display = 'block';
            renderEditor();
        }

        function renderEditor() {
            listaPreguntas.innerHTML = "";
            quizData.forEach((item, index) => {
                const pCard = document.createElement('div');
                pCard.className = 'pregunta-edit card';
                pCard.innerHTML = `
                    <button class="btn-delete" onclick="borrarPregunta(${index})">Eliminar</button>
                    <label>Pregunta:</label>
                    <textarea rows="2" oninput="actualizarDato(${index}, 'pregunta', this.value)">${modoDios ? item.pregunta : '*** PROTEGIDO ***'}</textarea>
                    <label>Opciones:</label>
                    ${[0,1,2,3].map(i => `
                        <div class="opcion-row">
                            <input type="radio" name="correcta-${index}" class="correcta-radio" ${item.respuestaCorrecta === i && modoDios ? 'checked' : ''} onclick="actualizarDato(${index}, 'respuestaCorrecta', ${i})">
                            <input type="text" class="opcion-input" value="${modoDios ? (item.opciones[i] || '') : '****'}" oninput="actualizarOpcion(${index}, ${i}, this.value)">
                        </div>
                    `).join('')}
                    <label>Explicación:</label>
                    <textarea rows="2" oninput="actualizarDato(${index}, 'explicacion', this.value)">${modoDios ? (item.explicacion || '') : '****'}</textarea>
                `;
                listaPreguntas.appendChild(pCard);
            });
        }

        function actualizarDato(i, f, v) { if(modoDios) quizData[i][f] = v; }
        function actualizarOpcion(pi, oi, v) { if(modoDios) quizData[pi].opciones[oi] = v; }
        function añadirPregunta() { quizData.push({ pregunta: "", opciones: ["","","",""], respuestaCorrecta: 0, explicacion: "" }); renderEditor(); }
        function borrarPregunta(i) { if(confirm("¿Borrar?")) { quizData.splice(i, 1); renderEditor(); } }
        function mostrarMensaje(m, t) { status.innerText = m; status.className = t; status.style.display = 'block'; setTimeout(() => status.style.display = 'none', 3000); }
        function descargarJSON() {
            const blob = new Blob([JSON.stringify(quizData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = originalFileName; a.click();
        }

        cargarIndice();
    </script>
</body>
</html>
