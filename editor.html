<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor de Cuestionarios - Acceso Restringido</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; margin-bottom: 20px; box-sizing: border-box; }
        h1 { color: #1b5e20; font-size: 1.5rem; text-align: center; margin-top: 0; }
        
        /* Estilos de camuflaje */
        .blur-content { filter: blur(8px); pointer-events: none; user-select: none; opacity: 0.5; }
        .hidden { display: none !important; }

        /* Zona de carga */
        .upload-section { display: flex; gap: 20px; flex-wrap: wrap; }
        .upload-box { flex: 1; min-width: 250px; }
        #drop-zone { border: 2px dashed #a5d6a7; padding: 20px; text-align: center; color: #666; cursor: pointer; border-radius: 8px; transition: 0.3s; height: 80px; display: flex; align-items: center; justify-content: center; }
        #drop-zone.hover { background: #e8f5e9; border-color: #2e7d32; }
        
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        
        #status { padding: 15px; border-radius: 6px; display: none; margin-bottom: 20px; width: 100%; max-width: 800px; }
        .success { background: #dcedc8; color: #33691e; border: 1px solid #a5d6a7; display: block !important; }
        .error { background: #ffcdd2; color: #b71c1c; border: 1px solid #ef9a9a; display: block !important; }
        
        .pregunta-edit { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; position: relative; background: #fafafa; }
        label { display: block; font-weight: bold; margin-top: 15px; font-size: 0.85rem; color: #444; text-transform: uppercase; }
        textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; font-family: inherit; }
        
        .opcion-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
        .opcion-input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .btn-delete { position: absolute; top: 15px; right: 15px; background: #ff5252; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 12px; }
        .btn-add { background: #1976d2; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 15px; font-weight: bold; }
        .btn-download { background: #2e7d32; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; width: 100%; }
        .correcta-radio { cursor: pointer; width: 20px; height: 20px; accent-color: #2e7d32; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="main-title">🔒 Editor Protegido</h1>
        <div class="upload-section">
            <div class="upload-box">
                <label>Archivo Local:</label>
                <div id="drop-zone">Arrastra un JSON o haz clic</div>
                <input type="file" id="file-input" style="display: none" accept=".json">
            </div>
            <div class="upload-box" id="repo-load-box">
                <label>Archivo del Servidor:</label>
                <select id="repo-selector">
                    <option value="" disabled selected>Cargando índice...</option>
                </select>
            </div>
        </div>
    </div>

    <div id="status"></div>

    <div id="editor-container" class="blur-content" style="width: 100%; max-width: 800px; display: none;">
        <div class="card" style="text-align: center; padding: 1rem;">
            <span>Archivo: </span><span id="nombre-archivo-display" style="font-weight:bold"></span>
        </div>
        
        <div id="lista-preguntas"></div>
        
        <div id="admin-controls" class="card hidden">
            <button class="btn-add" onclick="añadirPregunta()">➕ Añadir Nueva Pregunta</button>
            <button class="btn-download" onclick="descargarJSON()">📥 Guardar y Descargar JSON</button>
        </div>
    </div>

    <script>
        const repoSelector = document.getElementById('repo-selector');
        const status = document.getElementById('status');
        const editorContainer = document.getElementById('editor-container');
        const listaPreguntas = document.getElementById('lista-preguntas');
        const adminControls = document.getElementById('admin-controls');
        
        let quizData = [];
        let originalFileName = "cuestionario.json";
        let modoDios = false;

        // --- SISTEMA DE SEGURIDAD (MODO DIOS) ---
        document.addEventListener('keydown', (e) => {
            if (e.key === "F2") { 
                const clave = prompt("Introduce clave maestra:");
                if(clave === "1234") { // CAMBIA ESTA CLAVE
                    activarAdmin();
                } else {
                    alert("Clave incorrecta");
                }
            }
        });

        function activarAdmin() {
            modoDios = true;
            document.getElementById('main-title').innerText = "🛠 Editor de Cuestionarios";
            editorContainer.classList.remove('blur-content');
            adminControls.classList.remove('hidden');
            if(quizData.length > 0) renderEditor(); 
            mostrarMensaje("Modo administrador activado", "success");
        }

        // --- CARGA DE DATOS ---
        async function cargarIndice() {
            try {
                const response = await fetch('index.json');
                const temas = await response.json();
                repoSelector.innerHTML = '<option value="" disabled selected>Selecciona un test...</option>';
                temas.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.archivo;
                    opt.innerText = t.titulo;
                    repoSelector.appendChild(opt);
                });
            } catch (e) {
                console.log("No se pudo cargar el índice (uso local)");
            }
        }

        repoSelector.onchange = async (e) => {
            const ruta = e.target.value;
            originalFileName = ruta.split('/').pop();
            try {
                const response = await fetch(ruta);
                const data = await response.json();
                procesarDatos(data);
            } catch (err) { mostrarMensaje("Error al cargar archivo", "error"); }
        };

        document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                originalFileName = file.name;
                const reader = new FileReader();
                reader.onload = (ev) => procesarDatos(JSON.parse(ev.target.result));
                reader.readAsText(file);
            }
        };

        function procesarDatos(data) {
            quizData = data.map(({id, ...rest}) => rest);
            document.getElementById('nombre-archivo-display').innerText = originalFileName;
            editorContainer.style.display = 'block';
            renderEditor();
        }

        // --- RENDERIZADO Y EDICIÓN ---
        function renderEditor() {
            listaPreguntas.innerHTML = "";
            quizData.forEach((item, index) => {
                const pCard = document.createElement('div');
                pCard.className = 'pregunta-edit card';
                pCard.id = `pregunta-${index}`;
                pCard.innerHTML = `
                    <button class="btn-delete" onclick="borrarPregunta(${index})">Eliminar</button>
                    <label>Pregunta:</label>
                    <textarea rows="2" oninput="actualizarDato(${index}, 'pregunta', this.value)">${modoDios ? item.pregunta : '****************'}</textarea>
                    <label>Opciones:</label>
                    ${[0,1,2,3].map(i => `
                        <div class="opcion-row">
                            <input type="radio" name="correcta-${index}" class="correcta-radio" 
                                ${item.respuestaCorrecta === i && modoDios ? 'checked' : ''} 
                                onclick="actualizarDato(${index}, 'respuestaCorrecta', ${i})">
                            <input type="text" class="opcion-input" value="${modoDios ? (item.opciones[i] || '') : '********'}" 
                                oninput="actualizarOpcion(${index}, ${i}, this.value)">
                        </div>
                    `).join('')}
                    <label>Explicación:</label>
                    <textarea rows="2" oninput="actualizarDato(${index}, 'explicacion', this.value)">${modoDios ? (item.explicacion || '') : '********'}</textarea>
                `;
                listaPreguntas.appendChild(pCard);
            });
        }

        function actualizarDato(i, f, v) { if(modoDios) quizData[i][f] = v; }
        function actualizarOpcion(pi, oi, v) { if(modoDios) quizData[pi].opciones[oi] = v; }

        function añadirPregunta() {
            if(!modoDios) return;
            quizData.push({ pregunta: "", opciones: ["","","",""], respuestaCorrecta: 0, explicacion: "" });
            renderEditor();
            document.getElementById(`pregunta-${quizData.length - 1}`).scrollIntoView({ behavior: 'smooth' });
        }

        function borrarPregunta(i) {
            if(modoDios && confirm("¿Borrar pregunta?")) {
                quizData.splice(i, 1);
                renderEditor();
            }
        }

        function mostrarMensaje(m, t) {
            status.innerText = m; status.className = t; status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 3000);
        }

        function descargarJSON() {
            if(!modoDios) return;
            const blob = new Blob([JSON.stringify(quizData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = originalFileName; a.click();
        }

        cargarIndice();
    </script>
</body>
</html>
